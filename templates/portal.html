<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ViralVerse 18+ Portal</title>
  
  <!-- Telegram Web App SDK -->
  <script src="/static/telegram-web-app.js"></script>
  <script>
    if (!window.Telegram || !window.Telegram.WebApp) {
      var s = document.createElement('script');
      s.src = 'https://telegram.org/js/telegram-web-app.js';
      document.head.appendChild(s);
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050508;
      --bg-surface: #0a0a0f;
      --bg-card: #0e0e15;
      --accent: #ff0055;
      --accent2: #9d00ff;
      --accent-glow: rgba(255, 0, 85, 0.45);
      --text: #f1f5f9;
      --text-muted: #8892a4;
      --border: rgba(255, 255, 255, 0.08);
      --radius: 16px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* Ambient Glow Background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 0%, rgba(255, 0, 85, 0.15) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 85% 90%, rgba(157, 0, 255, 0.1) 0%, transparent 65%);
      pointer-events: none;
      z-index: -1;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Header */
    header {
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: center;
      margin-bottom: 10px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* Search Bar */
    .search-wrapper {
      position: relative;
      width: 100%;
    }

    .search-input {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px 20px;
      border-radius: var(--radius);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
    }

    /* Categories Tabs */
    .categories {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: none;
    }

    .categories::-webkit-scrollbar {
      display: none;
    }

    .category-tab {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.25s;
    }

    .category-tab:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .category-tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.35);
    }

    /* ── 👑 PREMIUM PAID TAB ── */
    .category-tab.premium-tab {
      position: relative;
      background: linear-gradient(135deg, #1a0a00, #2a1200);
      border: 1.5px solid #f5a623;
      color: #ffd166;
      font-weight: 800;
      letter-spacing: 0.3px;
      overflow: visible;
      padding-top: 16px; /* make room for crown */
      isolation: isolate;
    }

    /* Crown emoji floating above */
    .category-tab.premium-tab::before {
      content: '\1F451';
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1rem;
      filter: drop-shadow(0 0 6px rgba(255, 200, 50, 0.9));
      animation: crown-bounce 1.8s ease-in-out infinite;
      z-index: 2;
    }

    @keyframes crown-bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-4px); }
    }

    /* Rotating circular glow ring */
    .category-tab.premium-tab::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 999px;
      background: conic-gradient(
        from 0deg,
        transparent 0%,
        rgba(255, 200, 50, 0.9) 25%,
        rgba(255, 140, 0, 0.6) 50%,
        transparent 60%
      );
      animation: ring-spin 2s linear infinite;
      z-index: -1;
      mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #fff calc(100% - 2px));
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #fff calc(100% - 2px));
    }

    @keyframes ring-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .category-tab.premium-tab:hover,
    .category-tab.premium-tab.active {
      background: linear-gradient(135deg, #2a1400, #4a2000);
      border-color: #ffd166;
      color: #fff;
      box-shadow: 0 0 20px rgba(255, 180, 30, 0.55), 0 4px 16px rgba(255, 120, 0, 0.4);
      transform: scale(1.04);
    }

    /* ── Premium Movie Card ── */
    .movie-card.premium-card {
      border: 1.5px solid rgba(255, 180, 30, 0.5);
      box-shadow: 0 0 0 0 rgba(255, 180, 30, 0.4);
      animation: premium-pulse 2.5s ease-in-out infinite;
      background: linear-gradient(160deg, #0e0e15, #1a1200);
    }

    @keyframes premium-pulse {
      0%, 100% { box-shadow: 0 0 8px rgba(255, 180, 30, 0.3), 0 4px 20px rgba(255, 120, 0, 0.15); }
      50%       { box-shadow: 0 0 20px rgba(255, 200, 50, 0.6), 0 8px 30px rgba(255, 140, 0, 0.3); }
    }

    .movie-card.premium-card:hover {
      border-color: #ffd166;
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 0 28px rgba(255, 200, 50, 0.7), 0 12px 36px rgba(255, 140, 0, 0.35);
    }

    /* Premium badge overlay on card poster */
    .premium-badge {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: linear-gradient(135deg, rgba(180, 100, 0, 0.92), rgba(120, 50, 0, 0.85));
      border-bottom: 1px solid rgba(255, 200, 50, 0.4);
      color: #ffd166;
      font-size: 0.68rem;
      font-weight: 900;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 5px 8px;
      z-index: 5;
      text-shadow: 0 0 8px rgba(255, 220, 80, 0.7);
      animation: shimmer-text 2s ease-in-out infinite;
    }

    @keyframes shimmer-text {
      0%, 100% { opacity: 1; text-shadow: 0 0 8px rgba(255, 220, 80, 0.7); }
      50%       { opacity: 0.85; text-shadow: 0 0 16px rgba(255, 220, 80, 1); }
    }

    /* Shine sweep effect on premium cards */
    .movie-card.premium-card .movie-poster-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        115deg,
        transparent 0%,
        rgba(255, 220, 100, 0.12) 45%,
        rgba(255, 220, 100, 0.22) 50%,
        rgba(255, 220, 100, 0.12) 55%,
        transparent 100%
      );
      background-size: 200% 100%;
      animation: shine-sweep 3s ease-in-out infinite;
      pointer-events: none;
      z-index: 4;
    }

    @keyframes shine-sweep {
      0%   { background-position: -100% 0; }
      60%  { background-position: 200% 0; }
      100% { background-position: 200% 0; }
    }

    /* Movies Grid */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (min-width: 480px) {
      .movies-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* Movie Card */
    .movie-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      position: relative;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    }

    .movie-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.15);
    }

    .movie-poster-wrapper {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: #151a2e;
    }

    .movie-poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .movie-card:hover .movie-poster {
      transform: scale(1.05);
    }

    .movie-category-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(8, 11, 20, 0.75);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .movie-info {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-grow: 1;
    }

    .movie-title {
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: var(--text);
    }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding: 10px 0;
    }

    .pag-btn {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .pag-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.1);
    }

    .pag-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .page-info {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Loading Spinner */
    .loader {
      display: none;
      text-align: center;
      padding: 40px;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>🍒 ViralVerse 18+</h1>
      <p>Exclusive premium content and instant bot downloads.</p>
    </header>

    <!-- Search -->
    <div class="search-wrapper">
      <input type="text" id="searchInput" class="search-input" placeholder="Search videos, tags, or categories...">
    </div>

    <!-- Category Tabs -->
    <div class="categories" id="categoriesContainer">
      <div class="category-tab active" data-category="All">All Tags</div>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader">⚡ Loading Content...</div>

    <!-- Movie Grid -->
    <div class="movies-grid" id="moviesGrid"></div>

    <!-- Pagination -->
    <div class="pagination" id="paginationControls" style="display: none;">
      <button class="pag-btn" id="prevBtn" disabled>Previous</button>
      <span class="page-info" id="pageInfo">Page 1</span>
      <button class="pag-btn" id="nextBtn" disabled>Next</button>
    </div>
  </div>

  <script>
    // Initialize Telegram WebApp
    const tg = window.Telegram ? window.Telegram.WebApp : null;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    // Get Query Parameters
    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid') || '';
    let botUsername = urlParams.get('bot') || '';

    // Save and load bot username from localStorage to persist clone bot context
    if (botUsername) {
      localStorage.setItem('portal_bot_username', botUsername);
    } else {
      botUsername = localStorage.getItem('portal_bot_username') || '';
    }

    // State Variables
    let currentPage = 1;
    let currentCategory = 'All';
    let searchQuery = '';
    
    // Elements
    const searchInput = document.getElementById('searchInput');
    const categoriesContainer = document.getElementById('categoriesContainer');
    const moviesGrid = document.getElementById('moviesGrid');
    const loader = document.getElementById('loader');
    const paginationControls = document.getElementById('paginationControls');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pageInfo = document.getElementById('pageInfo');

    // Fetch and Populate Portal Data
    async function loadPortalData() {
      loader.style.display = 'block';
      moviesGrid.style.display = 'none';
      paginationControls.style.display = 'none';

      try {
        const response = await fetch(`/portal-data?page=${currentPage}&category=${encodeURIComponent(currentCategory)}&search=${encodeURIComponent(searchQuery)}`);
        const data = await response.json();

        // Render Categories if they've changed / initialized
        if (data.categories && data.categories.length > 0 && categoriesContainer.children.length === 1) {
          data.categories.forEach(cat => {
            if (cat !== 'All') {
              const tab = document.createElement('div');
              // Detect if this is a paid/premium category tab
              const isPaidCat = cat.toLowerCase().includes('paid') || cat.toLowerCase().includes('premium');
              tab.className = 'category-tab' + (isPaidCat ? ' premium-tab' : '');
              tab.setAttribute('data-category', cat);
              tab.innerText = cat;
              categoriesContainer.appendChild(tab);
            }
          });
          setupCategoryListeners();
        }

        // Render Movie Grid — premium posts already sorted first by backend
        moviesGrid.innerHTML = '';
        if (data.posts && data.posts.length > 0) {
          data.posts.forEach(post => {
            const card = document.createElement('div');
            const isPaid = post.is_paid === true;
            card.className = 'movie-card' + (isPaid ? ' premium-card' : '');
            card.innerHTML = `
              <div class="movie-poster-wrapper">
                ${isPaid ? `<div class="premium-badge">&#x1F451; PREMIUM</div>` : ''}
                <img class="movie-poster" src="${post.image_url || '/static/LOGO.jpg'}" alt="${post.title}" onerror="this.src='/static/LOGO.jpg'" style="${isPaid ? 'margin-top:28px; height:calc(100% - 28px);' : ''}">
                ${!isPaid ? `<span class="movie-category-badge">${post.category || 'General'}</span>` : ''}
              </div>
              <div class="movie-info">
                <div class="movie-title">${isPaid ? '&#x1F451; ' : ''}${post.title}</div>
                <div class="movie-stats" style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 0.8rem; color: var(--text-muted);">
                  <span class="views">👁 ${formatNumber(post.views || 0)}</span>
                  <div class="reactions" style="display: flex; gap: 6px;">
                    ${Object.entries(post.reactions || {}).map(([emoji, count]) => count > 0 ? `<span class="emoji-reaction" data-emoji="${emoji}" data-post-id="${post.id}" style="cursor: pointer; user-select: none;">${emoji} <span class="count">${count}</span></span>` : '').join('')}
                  </div>
                </div>
              </div>
            `;
            card.addEventListener('click', () => handleCardClick(post.file_deeplink, post.bot_username, post.id));
            moviesGrid.appendChild(card);
          });
          moviesGrid.style.display = 'grid';
          
          // Setup Emoji Listeners
          document.querySelectorAll('.emoji-reaction').forEach(btn => {
            btn.addEventListener('click', async (e) => {
              e.stopPropagation(); // Prevent card click
              const emoji = btn.getAttribute('data-emoji');
              const postId = btn.getAttribute('data-post-id');
              const countSpan = btn.querySelector('.count');
              
              // Optimistic UI update
              countSpan.innerText = parseInt(countSpan.innerText) + 1;
              
              try {
                await fetch('/api/react-post', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ post_id: postId, emoji: emoji })
                });
              } catch(err) {
                console.error("Reaction failed", err);
                countSpan.innerText = parseInt(countSpan.innerText) - 1; // Revert
              }
            });
          });

          // Update Pagination
          prevBtn.disabled = !data.has_prev;
          nextBtn.disabled = !data.has_next;
          pageInfo.innerText = `Page ${data.page} of ${data.total_pages}`;
          paginationControls.style.display = 'flex';
        } else {
          moviesGrid.innerHTML = '<div style="grid-column: span 3; text-align: center; padding: 40px; color: var(--text-muted);">No movies or files found.</div>';
          moviesGrid.style.display = 'block';
        }
      } catch (error) {
        console.error('Error loading portal data:', error);
      } finally {
        loader.style.display = 'none';
      }
    }

    function formatNumber(num) {
      if (num >= 1000) {
        return (num / 1000).toFixed(1) + 'k';
      }
      return num;
    }

    // Handle Card Click (Redirect directly to the bot with file payload)
    async function handleCardClick(deeplink, cardBotUsername, postId) {
      if (postId) {
        try {
          fetch('/api/view-post', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ post_id: postId })
          });
        } catch (e) { console.error('View increment failed', e); }
      }
      const username = cardBotUsername || botUsername || 'filesstoreclone_bot';
      const redirectUrl = `https://t.me/${username}?start=${deeplink}`;
      if (tg) {
        tg.openTelegramLink(redirectUrl);
        setTimeout(() => {
          tg.close();
        }, 500);
      } else {
        window.location.href = redirectUrl;
      }
    }

    // Category Listeners
    function setupCategoryListeners() {
      document.querySelectorAll('.category-tab').forEach(tab => {
        tab.addEventListener('click', (e) => {
          document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
          e.target.classList.add('active');
          currentCategory = e.target.getAttribute('data-category');
          currentPage = 1;
          loadPortalData();
        });
      });
    }

    // Search Input Listener with Debounce
    let searchTimeout;
    searchInput.addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        searchQuery = e.target.value;
        currentPage = 1;
        loadPortalData();
      }, 400);
    });

    // Pagination Listeners
    prevBtn.addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        loadPortalData();
      }
    });

    nextBtn.addEventListener('click', () => {
      currentPage++;
      loadPortalData();
    });

    // Initial Load
    setupCategoryListeners();
    loadPortalData();
  </script>
</body>
</html>
