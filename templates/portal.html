<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ViralVerse 18+ Portal</title>
  
  <!-- Telegram Web App SDK -->
  <script src="/static/telegram-web-app.js"></script>
  <script>
    if (!window.Telegram || !window.Telegram.WebApp) {
      var s = document.createElement('script');
      s.src = 'https://telegram.org/js/telegram-web-app.js';
      document.head.appendChild(s);
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050508;
      --bg-surface: #0a0a0f;
      --bg-card: #0e0e15;
      --accent: #ff0055;
      --accent2: #9d00ff;
      --accent-glow: rgba(255, 0, 85, 0.45);
      --text: #f1f5f9;
      --text-muted: #8892a4;
      --border: rgba(255, 255, 255, 0.08);
      --radius: 16px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      padding: 20px env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* Ambient Glow Background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 0%, rgba(255, 0, 85, 0.15) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 85% 90%, rgba(157, 0, 255, 0.1) 0%, transparent 65%);
      pointer-events: none;
      z-index: -1;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Header */
    header {
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: center;
      margin-bottom: 10px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* Search Bar */
    .search-wrapper {
      position: relative;
      width: 100%;
    }

    .search-input {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px 20px;
      border-radius: var(--radius);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
    }

    /* Categories Tabs */
    .categories {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: none;
    }

    .categories::-webkit-scrollbar {
      display: none;
    }

    .category-tab {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.25s;
    }

    .category-tab:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .category-tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.35);
    }

    /* Movies Grid */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (min-width: 480px) {
      .movies-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* Movie Card */
    .movie-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      position: relative;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    }

    .movie-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.15);
    }

    .movie-poster-wrapper {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: #151a2e;
    }

    .movie-poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .movie-card:hover .movie-poster {
      transform: scale(1.05);
    }

    .movie-category-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(8, 11, 20, 0.75);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .movie-info {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-grow: 1;
    }

    .movie-title {
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: var(--text);
    }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding: 10px 0;
    }

    .pag-btn {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .pag-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.1);
    }

    .pag-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .page-info {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Loading Spinner */
    .loader {
      display: none;
      text-align: center;
      padding: 40px;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>🍒 ViralVerse 18+</h1>
      <p>Exclusive premium content and instant bot downloads.</p>
    </header>

    <!-- Search -->
    <div class="search-wrapper">
      <input type="text" id="searchInput" class="search-input" placeholder="Search videos, tags, or categories...">
    </div>

    <!-- Category Tabs -->
    <div class="categories" id="categoriesContainer">
      <div class="category-tab active" data-category="All">All Tags</div>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader">⚡ Loading Content...</div>

    <!-- Movie Grid -->
    <div class="movies-grid" id="moviesGrid"></div>

    <!-- Pagination -->
    <div class="pagination" id="paginationControls" style="display: none;">
      <button class="pag-btn" id="prevBtn" disabled>Previous</button>
      <span class="page-info" id="pageInfo">Page 1</span>
      <button class="pag-btn" id="nextBtn" disabled>Next</button>
    </div>
  </div>

  <script>
    // Initialize Telegram WebApp
    const tg = window.Telegram ? window.Telegram.WebApp : null;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    // Get Query Parameters
    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid') || '';
    let botUsername = urlParams.get('bot') || '';

    // Save and load bot username from localStorage to persist clone bot context
    if (botUsername) {
      localStorage.setItem('portal_bot_username', botUsername);
    } else {
      botUsername = localStorage.getItem('portal_bot_username') || '';
    }

    // State Variables
    let currentPage = 1;
    let currentCategory = 'All';
    let searchQuery = '';
    
    // Elements
    const searchInput = document.getElementById('searchInput');
    const categoriesContainer = document.getElementById('categoriesContainer');
    const moviesGrid = document.getElementById('moviesGrid');
    const loader = document.getElementById('loader');
    const paginationControls = document.getElementById('paginationControls');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pageInfo = document.getElementById('pageInfo');

    // Fetch and Populate Portal Data
    async function loadPortalData() {
      loader.style.display = 'block';
      moviesGrid.style.display = 'none';
      paginationControls.style.display = 'none';

      try {
        const response = await fetch(`/portal-data?page=${currentPage}&category=${encodeURIComponent(currentCategory)}&search=${encodeURIComponent(searchQuery)}`);
        const data = await response.json();

        // Render Categories if they've changed / initialized
        if (data.categories && data.categories.length > 0 && categoriesContainer.children.length === 1) {
          data.categories.forEach(cat => {
            if (cat !== 'All') {
              const tab = document.createElement('div');
              tab.className = 'category-tab';
              tab.setAttribute('data-category', cat);
              tab.innerText = cat;
              categoriesContainer.appendChild(tab);
            }
          });
          setupCategoryListeners();
        }

        // Render Movie Grid
        moviesGrid.innerHTML = '';
        if (data.posts && data.posts.length > 0) {
          data.posts.forEach(post => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
              <div class="movie-poster-wrapper">
                <img class="movie-poster" src="${post.image_url || '/static/LOGO.jpg'}" alt="${post.title}" onerror="this.src='/static/LOGO.jpg'">
                <span class="movie-category-badge">${post.category || 'General'}</span>
              </div>
              <div class="movie-info">
                <div class="movie-title">${post.title}</div>
              </div>
            `;
            card.addEventListener('click', () => handleCardClick(post.file_deeplink, post.bot_username));
            moviesGrid.appendChild(card);
          });
          moviesGrid.style.display = 'grid';

          // Update Pagination
          prevBtn.disabled = !data.has_prev;
          nextBtn.disabled = !data.has_next;
          pageInfo.innerText = `Page ${data.page} of ${data.total_pages}`;
          paginationControls.style.display = 'flex';
        } else {
          moviesGrid.innerHTML = '<div style="grid-column: span 3; text-align: center; padding: 40px; color: var(--text-muted);">No movies or files found.</div>';
          moviesGrid.style.display = 'block';
        }
      } catch (error) {
        console.error('Error loading portal data:', error);
      } finally {
        loader.style.display = 'none';
      }
    }

    // Handle Card Click (Redirect directly to the bot with file payload)
    function handleCardClick(deeplink, cardBotUsername) {
      const username = cardBotUsername || botUsername || 'filesstoreclone_bot';
      const redirectUrl = `https://t.me/${username}?start=${deeplink}`;
      if (tg) {
        tg.openTelegramLink(redirectUrl);
        setTimeout(() => {
          tg.close();
        }, 500);
      } else {
        window.location.href = redirectUrl;
      }
    }

    // Category Listeners
    function setupCategoryListeners() {
      document.querySelectorAll('.category-tab').forEach(tab => {
        tab.addEventListener('click', (e) => {
          document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
          e.target.classList.add('active');
          currentCategory = e.target.getAttribute('data-category');
          currentPage = 1;
          loadPortalData();
        });
      });
    }

    // Search Input Listener with Debounce
    let searchTimeout;
    searchInput.addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        searchQuery = e.target.value;
        currentPage = 1;
        loadPortalData();
      }, 400);
    });

    // Pagination Listeners
    prevBtn.addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        loadPortalData();
      }
    });

    nextBtn.addEventListener('click', () => {
      currentPage++;
      loadPortalData();
    });

    // Initial Load
    setupCategoryListeners();
    loadPortalData();
  </script>
</body>
</html>
